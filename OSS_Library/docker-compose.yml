services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: jeonju-library-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jeonju-library-frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
